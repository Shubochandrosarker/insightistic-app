name: insightistic-app

services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
      - api
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        # Empty by default => proxy mode (browser calls same-origin /api).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      # Next.js forwards /api/* to the API container (no CORS needed).
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
    expose:
      - "3000"

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: Insightistic
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://api.insightistic.com}
      APP_KEY: ${APP_KEY:-base64:CHANGE_ME_GENERATE_WITH_ARTISAN_KEY_GENERATE}
      LOG_CHANNEL: stack
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-insightistic}
      DB_USERNAME: ${DB_USERNAME:-insightistic}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      INSIGHTISTIC_APP_URL: ${INSIGHTISTIC_APP_URL:-https://app.insightistic.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-common}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      INSIGHTISTIC_AI_PROVIDER: ${INSIGHTISTIC_AI_PROVIDER:-openai}
      INSIGHTISTIC_AI_MODEL: ${INSIGHTISTIC_AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-reports@insightistic.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Insightistic}
      STRIPE_SECRET: ${STRIPE_SECRET:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      SEED_PLANS: ${SEED_PLANS:-true}
    volumes:
      - api_storage:/var/www/html/storage
      - api_cache:/var/www/html/bootstrap/cache
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_NAME: Insightistic
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://api.insightistic.com}
      APP_KEY: ${APP_KEY:-base64:CHANGE_ME_GENERATE_WITH_ARTISAN_KEY_GENERATE}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-insightistic}
      DB_USERNAME: ${DB_USERNAME:-insightistic}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      INSIGHTISTIC_APP_URL: ${INSIGHTISTIC_APP_URL:-https://app.insightistic.com}
      STRIPE_SECRET: ${STRIPE_SECRET:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RUN_MIGRATIONS: "false"
      SEED_PLANS: "false"
    volumes:
      - api_storage:/var/www/html/storage
      - api_cache:/var/www/html/bootstrap/cache

  scheduler:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -lc "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    environment:
      APP_NAME: Insightistic
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://api.insightistic.com}
      APP_KEY: ${APP_KEY:-base64:CHANGE_ME_GENERATE_WITH_ARTISAN_KEY_GENERATE}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-insightistic}
      DB_USERNAME: ${DB_USERNAME:-insightistic}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      INSIGHTISTIC_APP_URL: ${INSIGHTISTIC_APP_URL:-https://app.insightistic.com}
      RUN_MIGRATIONS: "false"
      SEED_PLANS: "false"
    volumes:
      - api_storage:/var/www/html/storage
      - api_cache:/var/www/html/bootstrap/cache

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-insightistic}
      POSTGRES_USER: ${DB_USERNAME:-insightistic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-insightistic} -d ${DB_DATABASE:-insightistic}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  api_storage:
  api_cache:
