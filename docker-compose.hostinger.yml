name: Build Insightistic Docker Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: shubochandrosarker
  IMAGE_REPO: insightistic-app

jobs:
  build-app:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/app:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/app:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.insightistic.com
