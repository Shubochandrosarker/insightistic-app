<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insightistic — Dev Preview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--bg:#0B0F17;--panel:#131925;--line:#222C3C;--ink:#E6EAF2;--muted:#8A95A8;--accent:#3B82F6;--good:#22C55E;--bad:#EF4444}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
  header{padding:16px 24px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.2px}
  input{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 10px;border-radius:8px;font-size:13px}
  input.url{width:230px} input.tok{width:240px} input.sid{width:70px}
  button{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .ranges{display:flex;gap:6px;flex-wrap:wrap}
  .ranges button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  main{padding:24px;max-width:1100px;margin:0 auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .card .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .card .val{font-size:24px;font-weight:600;margin-top:6px}
  .delta{font-size:12px;margin-top:4px}
  .delta.up{color:var(--good)} .delta.down{color:var(--bad)} .delta.flat{color:var(--muted)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  @media(max-width:780px){.grid2{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .panel h2{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500}
  td.num,th.num{text-align:right}
  .status{color:var(--muted);font-size:12px;margin-left:auto}
  .err{color:var(--bad)}
</style>
</head>
<body>
<header>
  <h1>Insightistic · Dev Preview</h1>
  <input class="url" id="apiBase" placeholder="https://api.insightistic.com">
  <input class="tok" id="token" placeholder="Bearer token">
  <input class="sid" id="siteId" placeholder="Site ID" value="1">
  <button class="primary" onclick="saveAndLoad()">Load</button>
  <span class="status" id="status"></span>
</header>
<main>
  <div class="ranges" id="ranges" style="margin-bottom:18px">
    <button data-p="today">Today</button>
    <button data-p="yesterday">Yesterday</button>
    <button data-p="last_7_days">7 days</button>
    <button data-p="last_30_days" class="active">30 days</button>
    <button data-p="this_month">This month</button>
    <button data-p="last_month">Last month</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="grid2">
    <div class="panel"><h2>Revenue</h2><canvas id="revChart" height="160"></canvas></div>
    <div class="panel"><h2>Orders vs Failed</h2><canvas id="ordChart" height="160"></canvas></div>
  </div>

  <div class="grid2">
    <div class="panel"><h2>Top Products</h2><div id="products"></div></div>
    <div class="panel"><h2>Top Customers</h2><div id="customers"></div></div>
  </div>
</main>

<script>
let period = 'last_30_days';
let revChart, ordChart;

function cfg(){
  return {
    base: (document.getElementById('apiBase').value || '').replace(/\/$/,''),
    token: document.getElementById('token').value.trim(),
    site: document.getElementById('siteId').value.trim() || '1',
  };
}
function restore(){
  try{
    const s = JSON.parse(localStorage.getItem('ins_dev')||'{}');
    if(s.base) document.getElementById('apiBase').value = s.base;
    if(s.token) document.getElementById('token').value = s.token;
    if(s.site) document.getElementById('siteId').value = s.site;
  }catch(e){}
}
function saveAndLoad(){
  const c = cfg();
  try{ localStorage.setItem('ins_dev', JSON.stringify(c)); }catch(e){}
  loadAll();
}
async function api(path){
  const c = cfg();
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(`${c.base}/api/sites/${c.site}${path}${sep}period=${period}`, {
    headers: { 'Authorization': 'Bearer ' + c.token, 'Accept': 'application/json' }
  });
  if(!res.ok){ throw new Error('HTTP ' + res.status); }
  return res.json();
}
function money(n){ return '$' + Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function deltaHtml(d){
  if(d===null||d===undefined) return '<span class="delta flat">—</span>';
  const cls = d>0?'up':(d<0?'down':'flat');
  const arrow = d>0?'▲':(d<0?'▼':'·');
  return `<span class="delta ${cls}">${arrow} ${Math.abs(d)}%</span>`;
}

async function loadAll(){
  const st = document.getElementById('status'); st.className='status'; st.textContent='Loading…';
  try{
    const ov = await api('/analytics/overview');
    const m = ov.metrics, d = ov.deltas;
    document.getElementById('cards').innerHTML = [
      ['Revenue', money(m.revenue), deltaHtml(d.revenue)],
      ['Orders', m.orders, deltaHtml(d.orders)],
      ['Avg Order Value', money(m.average_order_value), deltaHtml(d.average_order_value)],
      ['Refunds', m.refunds, deltaHtml(d.refunds)],
      ['New Customers', m.new_customers, deltaHtml(d.new_customers)],
      ['Returning', m.returning_customers, deltaHtml(d.returning_customers)],
      ['Products Sold', m.products_sold, ''],
      ['Failed Orders', m.failed_orders, ''],
    ].map(([l,v,dd])=>`<div class="card"><div class="label">${l}</div><div class="val">${v}</div>${dd}</div>`).join('');

    const rev = await api('/analytics/revenue');
    const labels = rev.series.map(r=>r.date);
    drawLine('revChart', revChart, labels, rev.series.map(r=>r.revenue), 'Revenue', '#3B82F6', s=>revChart=s);

    const ord = await api('/analytics/orders');
    drawBars('ordChart', ordChart, ord.series.map(r=>r.date),
      ord.series.map(r=>r.orders), ord.series.map(r=>r.failed), s=>ordChart=s);

    const pr = await api('/analytics/products');
    document.getElementById('products').innerHTML = table(
      ['Product','Units','Revenue'],
      pr.top_products.map(p=>[p.name||('#'+p.product_id), p.units, money(p.revenue)]),
      [false,true,true]
    ) || '<p style="color:var(--muted)">No product sales in range.</p>';

    const cu = await api('/analytics/customers');
    document.getElementById('customers').innerHTML = table(
      ['Customer','Orders','Spent'],
      cu.top_customers.map(c=>[((c.first_name||'')+' '+(c.last_name||'')).trim()||('#'+c.external_customer_id), c.order_count, money(c.total_spent)]),
      [false,true,true]
    ) || '<p style="color:var(--muted)">No customers yet.</p>';

    st.textContent = 'Updated ' + new Date().toLocaleTimeString();
  }catch(e){
    st.className='status err'; st.textContent = 'Error: ' + e.message + ' (check URL, token, site, CORS)';
  }
}

function table(head, rows, nums){
  if(!rows||!rows.length) return '';
  const th = head.map((h,i)=>`<th class="${nums[i]?'num':''}">${h}</th>`).join('');
  const tr = rows.map(r=>'<tr>'+r.map((c,i)=>`<td class="${nums[i]?'num':''}">${c}</td>`).join('')+'</tr>').join('');
  return `<table><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
}
function drawLine(id, ref, labels, data, label, color, set){
  if(ref) ref.destroy();
  set(new Chart(document.getElementById(id), {
    type:'line',
    data:{labels, datasets:[{label, data, borderColor:color, backgroundColor:'rgba(59,130,246,.12)', fill:true, tension:.3, pointRadius:0}]},
    options:opts()
  }));
}
function drawBars(id, ref, labels, a, b, set){
  if(ref) ref.destroy();
  set(new Chart(document.getElementById(id), {
    type:'bar',
    data:{labels, datasets:[
      {label:'Orders', data:a, backgroundColor:'#22C55E'},
      {label:'Failed', data:b, backgroundColor:'#EF4444'}
    ]},
    options:opts()
  }));
}
function opts(){
  return {responsive:true, plugins:{legend:{labels:{color:'#8A95A8'}}},
    scales:{x:{ticks:{color:'#8A95A8',maxTicksLimit:8},grid:{color:'#1b2433'}},
            y:{ticks:{color:'#8A95A8'},grid:{color:'#1b2433'}}}};
}

document.getElementById('ranges').addEventListener('click', e=>{
  if(e.target.tagName!=='BUTTON') return;
  period = e.target.dataset.p;
  [...document.querySelectorAll('#ranges button')].forEach(b=>b.classList.toggle('active', b===e.target));
  loadAll();
});
restore();
</script>
</body>
</html>
